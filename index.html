<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Shreya 🌸</title>
    <style>
        :root {
            --primary: #a83279;
            --secondary: #e94560;
            --scroll-bg: #fdf5e6;
            --text-color: #3e2723;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1025, #2d1b4e, #4a2569);
            color: white;
            font-family: 'Georgia', serif;
            overflow-x: hidden;
            text-align: center;
        }

        /* --- Buttons --- */
        .btn {
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); }

        /* --- Countdown --- */
        #countdownPage { display: none; font-size: 150px; font-weight: bold; font-family: sans-serif; }

        /* --- Cake Section --- */
        #cakePage { display: none; flex-direction: column; align-items: center; }
        .cake-wrapper { font-size: 130px; position: relative; cursor: pointer; display: inline-block; }
        .flame {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 35px;
            animation: flicker 0.6s infinite alternate;
        }
        
        /* The Cat Helper */
        #catHelper {
            position: absolute;
            right: -80px;
            top: 30px;
            font-size: 70px;
            display: none;
            animation: catSlide 0.5s forwards;
        }

        /* Magical Sparkles */
        .sparkle {
            position: absolute;
            font-size: 25px;
            opacity: 0;
            animation: sparkleBurst 1.2s ease-out forwards;
        }

        /* --- The Scroll (Paper Effect) --- */
        #scrollPage {
            display: none;
            width: 90%;
            max-width: 650px;
            background-color: var(--scroll-bg);
            color: var(--text-color);
            padding: 60px 40px;
            border-radius: 2px;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.1), 0 15px 35px rgba(0,0,0,0.6);
            border-left: 12px solid #d7ccc8;
            border-right: 12px solid #d7ccc8;
            max-height: 85vh;
            overflow-y: auto;
            text-align: left;
            line-height: 1.8;
            position: relative;
        }

        .fade-in { opacity: 0; animation: fadeInText 2s forwards; }
        .delay-poem { animation-delay: 5s; } /* Poem appears after reading paragraph */

            margin-top: 40px;
            font-style: italic;
